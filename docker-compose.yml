services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: transaction-approval-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: src/TransactionApproval.Api/Dockerfile
    container_name: transaction-approval-api
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__Default: "Server=mssql,1433;Database=TransactionApprovalDb;User Id=sa;Password=Your_password123;TrustServerCertificate=true;Encrypt=false"
      Jwt__Issuer: "TransactionApproval.Api"
      Jwt__Audience: "TransactionApproval.Frontend"
      Jwt__SigningKey: "ReplaceThisWithASecretKeyOfAtLeast32Characters"
      Jwt__ExpiryMinutes: "120"
      Cors__AllowedOrigins__0: "http://localhost:5173"
      Cors__AllowedOrigins__1: "http://localhost:8081"
      BankingHours__Open: "08:00"
      BankingHours__Close: "18:00"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:8080"
    container_name: transaction-approval-frontend
    depends_on:
      - backend
    ports:
      - "8081:80"
